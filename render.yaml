databases:
  - name: dexterforms-db
    databaseName: dexterforms
    user: dexterforms
    plan: free

services:
  # ── Express / tRPC API ──────────────────────────────────────────────────────
  - type: web
    name: dexterforms-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9 turbo && NODE_ENV=development pnpm install --frozen-lockfile && turbo build --filter=@repo/api
    startCommand: pnpm --filter=@repo/database exec drizzle-kit migrate && pnpm --filter=@repo/database run db:seed:prod && node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: prod
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: dexterforms-db
          property: connectionString
      - key: BASE_URL
        value: https://dexterforms-api.onrender.com
      - key: FRONTEND_URL
        value: https://dexterforms-web.onrender.com
      - key: CORS_ORIGINS
        value: https://dexterforms-web.onrender.com
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      # ── Google OAuth (optional) ─────────────────────────────────────────────
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # ── Email / SMTP (optional) ─────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Next.js Web App ─────────────────────────────────────────────────────────
  - type: web
    name: dexterforms-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9 turbo && NODE_ENV=development pnpm install --frozen-lockfile && turbo build --filter=web
    startCommand: pnpm --filter=web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://dexterforms-api.onrender.com/trpc
      - key: NEXT_PUBLIC_APP_URL
        value: https://dexterforms-web.onrender.com

  # ── Keep-alive cron job ─────────────────────────────────────────────────────
  # Pings both services every 14 minutes so Render free tier never spins them
  # down (free tier idles after 15 minutes of no inbound traffic).
  - type: cron
    name: dexterforms-keepalive
    runtime: node
    plan: free
    schedule: "*/14 * * * *"
    buildCommand: "echo 'keepalive'"
    startCommand: >
      node -e "
        Promise.all([
          fetch('https://dexterforms-api.onrender.com/health').then(r => r.json()).then(d => console.log('[API]', JSON.stringify(d))),
          fetch('https://dexterforms-web.onrender.com/api/health').then(r => r.json()).then(d => console.log('[WEB]', JSON.stringify(d)))
        ]).catch(e => { console.error('Keepalive failed:', e.message); process.exit(1); })
      "
